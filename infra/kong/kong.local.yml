# =============================================================================
# infra/kong/kong.local.yml  -- Kong Declarative Config (LOCAL + HOSTED REFERENCE)
#
# LOCAL (Docker Compose):
#   Kong listens on http://localhost:8000
#   Upstreams resolve via Docker bridge DNS (jokes_network)
#
# HOSTED (Azure -- vm-kong, 85.211.240.162):
#   Config auto-generated from infra/terraform/kong.yml.tpl by Terraform
#   Kong listens on https://85.211.240.162  (TLS self-signed, IP SAN)
#   Upstreams use Azure private IPs:
#     joke-service     -> http://10.0.1.4:3001  (VM1)
#     submit-service   -> http://10.0.1.5:3002  (VM2)
#     moderate-service -> http://10.0.1.5:3004  (VM2, co-located)
#     rabbitmq mgmt    -> http://10.0.1.5:15672 (VM2)
#
# ACCESS URLS
# -------------------------------------------------------------------------------
#   Interface        Local                             Hosted
#   ---------------- --------------------------------- --------------------------------
#   Joke browse UI   http://localhost:8000/joke-ui     https://85.211.240.162/joke-ui
#   Joke API         http://localhost:8000/joke/any    https://85.211.240.162/joke/any
#   Submit UI        http://localhost:8000/submit      https://85.211.240.162/submit
#   Swagger docs     http://localhost:8000/docs        https://85.211.240.162/docs
#   Moderation UI    http://localhost:8000/moderate-ui https://85.211.240.162/moderate-ui
#   RabbitMQ Admin   http://localhost:8000/mq-admin/   https://85.211.240.162/mq-admin/
#                    credentials: guest / guest
#
# Auth0 config for LOCAL:  AUTH0_BASE_URL=http://localhost:8000
#                          Callback: http://localhost:8000/callback
#                          Logout:   http://localhost:8000/moderate-ui
# Auth0 config for HOSTED: AUTH0_BASE_URL=https://85.211.240.162
#                          Callback: https://85.211.240.162/callback
#                          Logout:   https://85.211.240.162/moderate-ui
# =============================================================================

_format_version: "3.0"
_transform: true

# =============================================================================
# Global Plugins -- applied to every request through Kong
# =============================================================================
plugins:
  - name: correlation-id
    config:
      header_name:     Kong-Request-ID
      generator:       uuid
      echo_downstream: true

# =============================================================================
# Services and Routes
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Joke Service
  #   LOCAL:  Docker DNS joke-service:4000
  #   HOSTED: http://10.0.1.4:3001
  #
  # GET /joke/:type  -> API -- fetch jokes by type
  # GET /joke/any    -> API -- random joke
  # GET /joke-ui     -> Joke Machine HTML frontend (strip_path removes prefix)
  #
  # Rate limiting: 5 requests/minute per client IP (429 on breach)
  # ---------------------------------------------------------------------------
  - name: joke-service
    url:             http://joke-service:4000
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      - name:          joke-route
        paths:         [/joke]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      - name:          joke-frontend-route
        paths:         [/joke-ui]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

    plugins:
      - name: rate-limiting
        config:
          minute:              5
          policy:              local
          error_code:          429
          error_message:       "Rate limit exceeded -- Joke API allows 5 req/min. Retry after 60 seconds."
          hide_client_headers: false

  # ---------------------------------------------------------------------------
  # Submit Service
  #   LOCAL:  Docker DNS submit-service:4200
  #   HOSTED: http://10.0.1.5:3002
  #
  # GET  /submit  -> Submit Joke HTML frontend (strip_path removes prefix)
  # POST /submit  -> Joke submission API (publishes to submit RabbitMQ queue)
  # GET  /types   -> Joke type list from local ECST cache (no call to joke-service)
  # GET  /docs    -> Swagger / OpenAPI interactive documentation
  # ---------------------------------------------------------------------------
  - name: submit-service
    url:             http://submit-service:4200
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      - name:          submit-frontend-route
        paths:         [/submit]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      - name:          submit-api-route
        paths:         [/submit]
        strip_path:    false
        preserve_host: false
        methods:       [POST]

      - name:          types-route
        paths:         [/types]
        strip_path:    false
        preserve_host: false
        methods:       [GET]

      - name:          docs-route
        paths:         [/docs]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD]

  # ---------------------------------------------------------------------------
  # Moderate Service
  #   LOCAL:  Docker DNS moderator-service:3004
  #   HOSTED: http://10.0.1.5:3004
  #
  # Authentication is handled INSIDE the service via Auth0 OIDC.
  # Kong proxies all requests without modification.
  #
  # GET  /moderate-ui  -> Moderation HTML frontend (strip_path removes prefix)
  # GET  /moderate     -> Pull next joke from submit queue (Auth0 protected)
  # POST /moderated    -> Approve joke -> push to moderated queue (Auth0 protected)
  # POST /reject       -> Discard joke with nack (Auth0 protected)
  # GET  /me           -> Authenticated user profile from Auth0 session
  # *    /login /logout /callback  -> Auth0 OIDC flow (express-openid-connect)
  # ---------------------------------------------------------------------------
  - name: moderate-service
    url:             http://moderator-service:3004
    connect_timeout: 5000
    read_timeout:    15000
    write_timeout:   10000
    retries:         2

    routes:
      - name:          moderate-frontend-route
        paths:         [/moderate-ui]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      - name:          moderate-get-route
        paths:         [/moderate]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD]

      - name:          moderated-post-route
        paths:         [/moderated]
        strip_path:    false
        preserve_host: false
        methods:       [POST, OPTIONS]

      - name:          reject-route
        paths:         [/reject]
        strip_path:    false
        preserve_host: false
        methods:       [POST, OPTIONS]

      - name:          moderate-auth-route
        paths:         [/login, /logout, /callback, /me]
        strip_path:    false
        preserve_host: false
        methods:       [GET, POST, OPTIONS]

  # ---------------------------------------------------------------------------
  # RabbitMQ Management UI
  #   LOCAL:  Docker DNS rabbitmq:15672
  #   HOSTED: http://10.0.1.5:15672
  #
  # The management UI is a single-page app (SPA):
  #   - Entry point loads at /mq-admin/  (trailing slash required)
  #   - Static assets  -> /mq-admin/js/, /mq-admin/img/ etc  (strip_path=true)
  #   - API calls      -> absolute /api/...                   (strip_path=false)
  #
  # Access: /mq-admin/   credentials: guest / guest
  # ---------------------------------------------------------------------------
  - name: rabbitmq-management
    url:             http://rabbitmq:15672
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         1

    routes:
      - name:          mq-admin-route
        paths:         [/mq-admin]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, POST, PUT, DELETE, OPTIONS]

      - name:          mq-api-route
        paths:         [/api]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD, POST, PUT, DELETE, OPTIONS]
