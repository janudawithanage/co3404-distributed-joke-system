<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CO3404 – Submit a Joke</title>
  <style>
    :root {
      --bg:           #0f172a;
      --surface:      #1e293b;
      --surface2:     #334155;
      --accent:       #10b981;
      --accent-hover: #059669;
      --text:         #f1f5f9;
      --muted:        #94a3b8;
      --success:      #22c55e;
      --error:        #ef4444;
      --radius:       12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color:      var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height:  100vh;
      display:     flex;
      flex-direction: column;
      align-items: center;
      padding:     2rem 1rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2.2rem; color: var(--accent); }
    header p  { color: var(--muted); margin-top: 0.4rem; font-size: 0.9rem; }

    .form-card {
      background:     var(--surface);
      border-radius:  var(--radius);
      padding:        2rem;
      width:          100%;
      max-width:      520px;
      display:        flex;
      flex-direction: column;
      gap:            1.3rem;
    }

    .form-group            { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label      { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.05em; }

    input,
    textarea,
    select {
      background:    var(--surface2);
      border:        1px solid #475569;
      color:         var(--text);
      border-radius: 8px;
      padding:       0.65rem 0.9rem;
      font-size:     1rem;
      font-family:   inherit;
      width:         100%;
    }
    textarea         { resize: vertical; min-height: 80px; }
    input:focus,
    textarea:focus,
    select:focus     { outline: none; border-color: var(--accent); }

    .type-row        { display: flex; gap: 0.6rem; align-items: flex-end; }
    .type-row select { flex: 1; }
    .type-row input  { flex: 1; display: none; } /* shown when custom selected */

    button {
      background:    var(--accent);
      color:         #fff;
      border:        none;
      padding:       0.8rem;
      border-radius: 8px;
      font-size:     1rem;
      cursor:        pointer;
      transition:    background 0.2s;
      font-weight:   600;
    }
    button:hover    { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert {
      padding:       0.85rem 1rem;
      border-radius: 8px;
      font-size:     0.95rem;
    }
    .alert-success { background: #14532d; color: var(--success); border: 1px solid var(--success); }
    .alert-error   { background: #450a0a; color: var(--error);   border: 1px solid var(--error);   }

    .footer-links {
      margin-top: 1.8rem;
      text-align: center;
      color:      var(--muted);
      font-size:  0.85rem;
      display:    flex;
      gap:        1.5rem;
      justify-content: center;
    }
    .footer-links a { color: var(--accent); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>📬 Submit a Joke</h1>
    <p>CO3404 Distributed Systems &mdash; Submit Microservice &mdash; Port 3002</p>
  </header>

  <div class="form-card">

    <div class="form-group">
      <label for="setup">Setup <span style="color:var(--error)">*</span></label>
      <textarea id="setup" placeholder="Why did the developer go broke?"></textarea>
    </div>

    <div class="form-group">
      <label for="punchline">Punchline <span style="color:var(--error)">*</span></label>
      <textarea id="punchline" placeholder="Because they used up all their cache!"></textarea>
    </div>

    <div class="form-group">
      <label>Type <span style="color:var(--error)">*</span></label>
      <div class="type-row">
        <select id="typeSelect"></select>
        <input  id="typeCustom" type="text" placeholder="Custom type…" />
      </div>
    </div>

    <div id="alertBox"></div>

    <button id="submitBtn">Submit Joke</button>
  </div>

  <div class="footer-links">
    <a href="/docs"   target="_blank">📄 Swagger API Docs</a>
    <a href="/health" target="_blank">❤️ Health Check</a>
  </div>

  <script src="app.js"></script>
</body>
</html>
