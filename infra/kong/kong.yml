# =============================================================================
# infra/kong/kong.yml
#
# Kong declarative configuration (DB-less mode).
# Deployed to VM3 (kong-vm) at: /opt/kong/kong.yml
# =============================================================================

_format_version: "3.0"
_transform: true

# =============================================================================
# Global Plugins
# Applied to every request that passes through Kong, regardless of route.
# =============================================================================
plugins:
  - name: correlation-id
    config:
      header_name:      Kong-Request-ID
      generator:        uuid
      echo_downstream:  true

# =============================================================================
# Services and Routes
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Joke Service — VM1 (10.0.1.4:3001)
  #
  # Route 1: /joke   (strip_path=false)  → API endpoints
  #   Kong receives:   GET /joke/programming
  #   Forwards to:     GET http://10.0.1.4:3001/joke/programming
  #
  # Route 2: /joke-ui (strip_path=true)  → Joke Machine frontend HTML
  #   Kong receives:   GET /joke-ui
  #   Forwards to:     GET http://10.0.1.4:3001/
  #
  # Rate limiting: 5 requests/minute per client IP.
  # Demonstrating that a downstream service can be protected by Kong
  # without modifying the service itself.
  # ---------------------------------------------------------------------------
  - name: joke-service
    url:              http://10.0.1.4:3001
    connect_timeout:  5000
    read_timeout:     10000
    write_timeout:    10000
    retries:          3

    routes:
      - name:           joke-route
        paths:          [/joke]
        strip_path:     false
        preserve_host:  false
        methods:        [GET, HEAD, OPTIONS]

      # Exposes the Joke Machine HTML frontend at /joke-ui through Kong
      - name:           joke-frontend-route
        paths:          [/joke-ui]
        strip_path:     true
        preserve_host:  false
        methods:        [GET, OPTIONS]

    plugins:
      - name: rate-limiting
        config:
          minute:         5
          policy:         local          # "local" = per Kong node, fine for single-VM demo
          error_code:     429
          error_message:  "Rate limit exceeded — Joke API allows 5 req/min. Retry after 60 seconds."
          hide_client_headers: false    # expose X-RateLimit-Remaining-Minute header

  # ---------------------------------------------------------------------------
  # Submit Service — VM2 (10.0.1.5:3002)
  #
  # Two routes are needed:
  #   1. GET  /submit  (strip_path=true)  → / on VM2  → serves the HTML frontend
  #   2. POST /submit  (strip_path=false) → /submit on VM2 → joke submission API
  #
  # A third route exposes /types so the frontend JS (fetch('/types')) can reach
  # the Submit service's proxy endpoint without leaving Kong.
  #
  # No rate limiting on submit — demonstrates per-service plugin configuration.
  # ---------------------------------------------------------------------------
  - name: submit-service
    url:              http://10.0.1.5:3002
    connect_timeout:  5000
    read_timeout:     10000
    write_timeout:    10000
    retries:          3

    routes:
      # Serves the submit HTML frontend (express.static at /)
      - name:           submit-frontend-route
        paths:          [/submit]
        strip_path:     true
        preserve_host:  false
        methods:        [GET, OPTIONS]

      # Forwards POST /submit → POST /submit on VM2 (joke submission API)
      - name:           submit-api-route
        paths:          [/submit]
        strip_path:     false
        preserve_host:  false
        methods:        [POST]

      # Exposes /types so the frontend JS (fetch('/types')) works through Kong
      - name:           submit-types-route
        paths:          [/types]
        strip_path:     false
        preserve_host:  false
        methods:        [GET]
  # ---------------------------------------------------------------------------
  # Moderator Service — NEW in Option 4
  # VM2 (10.0.1.5:3004) — update the IP if moderator runs on a separate VM.
  #
  # Routes:
  #   GET  /moderate-ui   → / on moderator (strip_path=true)  → HTML frontend
  #   GET  /moderate      → /moderate (strip_path=false)       → poll queue API
  #   POST /moderated     → /moderated (strip_path=false)      → approve API
  #   POST /reject        → /reject (strip_path=false)         → reject API
  #
  # read_timeout is 30 s to accommodate long-poll behaviour.
  # ---------------------------------------------------------------------------
  - name: moderator-service
    url:              http://10.0.1.5:3004
    connect_timeout:  5000
    read_timeout:     30000
    write_timeout:    10000
    retries:          3

    routes:
      # Serves the moderator HTML frontend at /moderate-ui through Kong
      - name:           moderator-frontend-route
        paths:          [/moderate-ui]
        strip_path:     true
        preserve_host:  false
        methods:        [GET, OPTIONS]

      # Moderator polls this to fetch the next joke for review
      - name:           moderator-get-route
        paths:          [/moderate]
        strip_path:     false
        preserve_host:  false
        methods:        [GET, OPTIONS]

      # Moderator posts approved joke to the moderated queue
      - name:           moderator-post-route
        paths:          [/moderated]
        strip_path:     false
        preserve_host:  false
        methods:        [POST, OPTIONS]

      # Moderator rejects and discards a joke
      - name:           moderator-reject-route
        paths:          [/reject]
        strip_path:     false
        preserve_host:  false
        methods:        [POST, OPTIONS]