<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CO3404 – Joke Moderator</title>
  <style>
    :root {
      --bg:           #0f172a;
      --surface:      #1e293b;
      --surface2:     #334155;
      --accent:       #f59e0b;
      --accent-hover: #d97706;
      --danger:       #ef4444;
      --danger-hover: #dc2626;
      --success:      #22c55e;
      --warn:         #f59e0b;
      --text:         #f1f5f9;
      --muted:        #94a3b8;
      --radius:       12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:     var(--bg);
      color:          var(--text);
      font-family:    'Segoe UI', system-ui, sans-serif;
      min-height:     100vh;
      display:        flex;
      flex-direction: column;
      align-items:    center;
      padding:        2rem 1rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2.2rem; color: var(--accent); }
    header p  { color: var(--muted); margin-top: 0.4rem; font-size: 0.9rem; }

    .card {
      background:    var(--surface);
      border-radius: var(--radius);
      padding:       2rem;
      width:         100%;
      max-width:     560px;
    }

    /* ── Waiting state ─────────────────────────────────── */
    #waitingMsg {
      text-align: center;
      color:      var(--muted);
      font-size:  1.1rem;
      padding:    2.5rem 0;
      animation:  pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* ── Moderation form ───────────────────────────────── */
    #jokeForm { display: none; flex-direction: column; gap: 1.2rem; }

    .form-group {
      display:        flex;
      flex-direction: column;
      gap:            0.4rem;
    }

    .form-group label {
      color:          var(--muted);
      font-size:      0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display:        flex;
      align-items:    center;
      gap:            0.4rem;
    }

    .badge {
      font-size:      0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background:     var(--surface2);
      color:          var(--muted);
      border-radius:  4px;
      padding:        0.1rem 0.45rem;
    }

    textarea,
    input[type="text"] {
      background:  var(--surface2);
      border:      1px solid #475569;
      color:       var(--text);
      border-radius: 8px;
      padding:     0.65rem 0.9rem;
      font-size:   1rem;
      font-family: inherit;
      width:       100%;
    }
    textarea       { resize: vertical; min-height: 72px; }
    textarea:focus,
    input:focus    { outline: none; border-color: var(--accent); }

    /* ── Action buttons ────────────────────────────────── */
    .btn-row {
      display: flex;
      gap:     0.8rem;
      margin-top: 0.4rem;
    }

    .btn {
      flex:        1;
      padding:     0.8rem;
      border:      none;
      border-radius: 8px;
      font-size:   1rem;
      font-weight: 600;
      cursor:      pointer;
      font-family: inherit;
      transition:  background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-approve {
      background: var(--accent);
      color:      #000;
    }
    .btn-approve:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-reject {
      background: var(--danger);
      color:      #fff;
    }
    .btn-reject:hover:not(:disabled) { background: var(--danger-hover); }

    /* ── Status alerts ─────────────────────────────────── */
    #status   { margin-top: 1rem; min-height: 2.5rem; }
    .alert    { border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.9rem; }
    .alert-success { background: #14532d; color: var(--success); }
    .alert-error   { background: #450a0a; color: var(--danger);  }
    .alert-warn    { background: #451a03; color: var(--warn);    }

    /* ── Live indicator ────────────────────────────────── */
    .live-dot {
      display:       inline-block;
      width:         8px; height: 8px;
      background:    var(--accent);
      border-radius: 50%;
      margin-right:  5px;
      animation:     pulse 1s ease-in-out infinite;
    }

    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 0.2rem 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>🛡️ Joke Moderator</h1>
    <p>
      CO3404 Distributed Systems · Option 4
      &nbsp;·&nbsp;
      <span class="live-dot"></span>Polling queue every 1 s
    </p>
  </header>

  <div class="card">

    <!-- ── Waiting state ──────────────────────────────── -->
    <div id="waitingMsg">No jokes available. Waiting…</div>

    <!-- ── Moderation form ────────────────────────────── -->
    <form id="jokeForm" onsubmit="return false;">

      <div class="form-group">
        <label for="setup">
          Setup <span class="badge">editable</span>
        </label>
        <textarea id="setup" rows="2" placeholder="Joke setup line…"></textarea>
      </div>

      <div class="form-group">
        <label for="punchline">
          Punchline <span class="badge">editable</span>
        </label>
        <textarea id="punchline" rows="2" placeholder="Joke punchline…"></textarea>
      </div>

      <div class="form-group">
        <label for="type">
          Type <span class="badge">editable</span>
        </label>
        <input id="type" type="text" placeholder="e.g. programming, general, dad…" />
      </div>

      <hr class="divider" />

      <div class="btn-row">
        <button id="approveBtn" class="btn btn-approve" onclick="approveJoke()">
          ✅ Approve &amp; Forward
        </button>
        <button id="rejectBtn" class="btn btn-reject" onclick="rejectJoke()">
          ❌ Reject
        </button>
      </div>

    </form>

    <div id="status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
