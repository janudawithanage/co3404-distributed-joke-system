<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- base href ensures relative assets (app.js) resolve correctly when
       accessed via Kong (which strips /moderate-ui but keeps the browser URL). -->
  <base href="/moderate-ui/" />
  <title>Moderate · Luxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1d;
      --surface: rgba(255,255,255,0.04);
      --card: rgba(255,255,255,0.06);
      --stroke: rgba(255,255,255,0.08);
      --accent: #5ce1e6;
      --approve: #7cf6c4;
      --reject: #ff6b6b;
      --text: #e7eefb;
      --muted: #95a4c7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at 10% 20%, rgba(92,225,230,0.12), transparent 30%), var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding: 28px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    header {
      width: 100%;
      max-width: 760px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }
    .header-left h1 { font-size: 32px; letter-spacing: -0.01em; }
    .header-left p { color: var(--muted); margin-top: 6px; }
    .user-info { display: flex; gap: 10px; align-items: center; background: var(--card); border: 1px solid var(--stroke); padding: 10px 12px; border-radius: 14px; }
    .user-info img { width: 32px; height: 32px; border-radius: 50%; }
    .logout-btn { border: 1px solid var(--stroke); background: transparent; color: var(--text); padding: 6px 10px; border-radius: 10px; cursor: pointer; }

    #status-banner { max-width: 760px; width: 100%; background: var(--card); border: 1px solid var(--stroke); border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; gap: 12px; color: var(--muted); }
    .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .mod-card { width: 100%; max-width: 760px; background: var(--card); border: 1px solid var(--stroke); border-radius: 18px; padding: 20px; display: none; flex-direction: column; gap: 14px; }
    .mod-card.visible { display: flex; }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label { color: var(--muted); font-size: 13px; letter-spacing: 0.03em; }
    textarea, input[type="text"], select { background: rgba(255,255,255,0.04); border: 1px solid var(--stroke); color: var(--text); padding: 12px; border-radius: 12px; font-size: 15px; font-family: inherit; }
    textarea { min-height: 90px; resize: vertical; }
    textarea:focus, input:focus, select:focus { outline: 2px solid rgba(92,225,230,0.4); border-color: rgba(92,225,230,0.8); }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button { padding: 12px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; }
    .btn-approve { background: var(--approve); color: #04101a; }
    .btn-reject { background: var(--reject); color: #fff; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--card); border: 1px solid var(--stroke); padding: 12px 16px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: transform 0.3s ease; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(124,246,196,0.5); }
    #toast.error { border-color: rgba(255,107,107,0.5); }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>⚖️ Joke Moderator</h1>
      <p>CO3404 – Distributed Systems Option 4</p>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <img id="user-avatar" src="" alt="avatar" />
      <span id="user-name"></span>
      <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
    </div>
  </header>

  <!-- Polling status banner -->
  <div id="status-banner">
    <div class="spinner"></div>
    <span id="status-text">Connecting to moderation queue…</span>
  </div>

  <!-- Moderation form card -->
  <div class="mod-card" id="mod-card">
    <div class="queue-info">Review and edit the joke before approving.</div>

    <div class="field-group">
      <label>Setup (Question)</label>
      <textarea id="setup" rows="2" placeholder="Enter the joke setup…"></textarea>
    </div>

    <div class="field-group">
      <label>Punchline (Answer)</label>
      <textarea id="punchline" rows="2" placeholder="Enter the punchline…"></textarea>
    </div>

    <div class="field-group">
      <label>Joke Type</label>
      <select id="type">
        <option value="">— select type —</option>
      </select>
    </div>

    <div class="actions">
      <button class="btn-approve" id="btn-approve" onclick="approveJoke()">
        ✅ Approve
      </button>
      <button class="btn-reject" id="btn-reject" onclick="rejectJoke()">
        ❌ Reject
      </button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
