# =============================================================================
# infra/kong/kong.local.yml  (LOCAL DEVELOPMENT — Docker Compose)
#
# Kong declarative configuration for local docker-compose.yml.
# Uses Docker service-name DNS resolution (jokes_network bridge).
#
# Option 4 routes (new):
#   GET  /moderate      → moderate-service (protected by Auth0 OIDC)
#   POST /moderated     → moderate-service (approve joke)
#   POST /reject        → moderate-service (reject joke)
#   GET  /moderate-ui   → moderate-service frontend
#
# Container ports:
#   joke-service        → port 4000
#   submit-service      → port 4200
#   moderate-service    → port 4300
#   rabbitmq mgmt       → port 15672
# =============================================================================

_format_version: "3.0"
_transform: true

plugins:
  - name: correlation-id
    config:
      header_name:     Kong-Request-ID
      generator:       uuid
      echo_downstream: true

services:

  # ---------------------------------------------------------------------------
  # Joke Service — Docker DNS: joke-service:4000
  # ---------------------------------------------------------------------------
  - name: joke-service
    url:             http://joke-service:4000
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      - name:          joke-route
        paths:         [/joke]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      - name:          joke-frontend-route
        paths:         [/joke-ui]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

    plugins:
      - name: rate-limiting
        config:
          minute:              5
          policy:              local
          error_code:          429
          error_message:       "Rate limit exceeded — 5 req/min allowed. Retry after 60 seconds."
          hide_client_headers: false

  # ---------------------------------------------------------------------------
  # Submit Service — Docker DNS: submit-service:4200
  # ---------------------------------------------------------------------------
  - name: submit-service
    url:             http://submit-service:4200
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      - name:          submit-frontend-route
        paths:         [/submit]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      - name:          submit-api-route
        paths:         [/submit]
        strip_path:    false
        preserve_host: false
        methods:       [POST]

      - name:          types-route
        paths:         [/types]
        strip_path:    false
        preserve_host: false
        methods:       [GET]

      - name:          docs-route
        paths:         [/docs]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD]

  # ---------------------------------------------------------------------------
  # Moderate Service — Docker DNS: moderate-service:4300  (NEW — Option 4)
  #
  # Auth0 OIDC authentication is handled INSIDE the moderate-service.
  # Kong forwards requests without modification. The service uses
  # express-openid-connect session cookies to protect UI and API endpoints.
  #
  # Routes:
  #   GET  /moderate-ui   → Serves the moderation HTML frontend
  #                         (strip_path=true: Kong strips /moderate-ui prefix)
  #   GET  /moderate      → Returns next joke from submit queue
  #   POST /moderated     → Approves joke, sends to moderated queue
  #   POST /reject        → Rejects (discards) current pending joke
  #   GET  /me            → Returns authenticated user profile
  # ---------------------------------------------------------------------------
  - name: moderate-service
    url:             http://moderate-service:4300
    connect_timeout: 5000
    read_timeout:    15000
    write_timeout:   10000
    retries:         2

    routes:
      # GET /moderate-ui → serves the moderation frontend HTML
      - name:          moderate-frontend-route
        paths:         [/moderate-ui]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      # GET /moderate → fetch next joke for review (OIDC protected in service)
      - name:          moderate-get-route
        paths:         [/moderate]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD]

      # POST /moderated → approve joke (OIDC protected in service)
      - name:          moderated-post-route
        paths:         [/moderated]
        strip_path:    false
        preserve_host: false
        methods:       [POST, OPTIONS]

      # POST /reject → discard joke (OIDC protected in service)
      - name:          reject-route
        paths:         [/reject]
        strip_path:    false
        preserve_host: false
        methods:       [POST, OPTIONS]

      # Auth0 OIDC callback and logout routes (handled by express-openid-connect)
      - name:          moderate-auth-route
        paths:         [/login, /logout, /callback, /me]
        strip_path:    false
        preserve_host: false
        methods:       [GET, POST, OPTIONS]

  # ---------------------------------------------------------------------------
  # RabbitMQ Management UI — Docker DNS: rabbitmq:15672
  # ---------------------------------------------------------------------------
  - name: rabbitmq-management
    url:             http://rabbitmq:15672
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         1

    routes:
      - name:          mq-admin-route
        paths:         [/mq-admin]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, POST, PUT, DELETE, OPTIONS]
