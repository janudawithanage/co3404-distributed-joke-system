# =============================================================================
# infra/kong/kong.local.yml  (LOCAL DEVELOPMENT)
#
# Kong declarative configuration for local Docker Compose development.
# Mounted into the Kong container by the root docker-compose.yml.
#
# Service routing (Kong → Docker service hostnames):
#   joke-service     → http://joke-service:4000
#   submit-service   → http://submit-service:4200
#   moderate-service → http://moderate-service:4300
#   etl-service      → http://etl-service:4001   (health only)
#   rabbitmq mgmt    → http://rabbitmq:15672
#
# Public routes exposed through Kong (http://localhost:8000):
#   GET  /joke/:type   → joke-service
#   GET  /types        → submit-service (ECST cache)
#   GET  /joke-ui      → joke-service frontend
#   GET  /submit       → submit-service frontend
#   POST /submit       → submit-service API
#   GET  /docs         → submit-service Swagger UI
#   GET  /moderate-ui  → moderate-service frontend (Auth0 protected)
#   GET  /moderate     → moderate-service API (Auth0 protected)
#   POST /moderated    → moderate-service API (Auth0 protected)
#   POST /reject       → moderate-service API (Auth0 protected)
#   *    /mq-admin     → RabbitMQ management UI
# =============================================================================

_format_version: "3.0"
_transform: true

# =============================================================================
# Global Plugins - applied to every request through Kong
# =============================================================================
plugins:
  - name: correlation-id
    config:
      header_name:     Kong-Request-ID
      generator:       uuid
      echo_downstream: true

# =============================================================================
# Services and Routes
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Joke Service (Docker service: joke-service:4000)
  #
  # GET /joke/:type  → API: fetch jokes by type
  # GET /joke-ui     → Joke Machine HTML frontend
  #
  # Rate limiting: 5 requests/minute per client IP.
  # ---------------------------------------------------------------------------
  - name: joke-service
    url:             http://joke-service:4000
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      - name:          joke-route
        paths:         [/joke]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]
        # Rate limiting applied at ROUTE level (not service level).
        # This ensures /joke-ui (the frontend) is NOT rate-limited —
        # only the /joke API endpoints are.
        plugins:
          - name: rate-limiting
            config:
              minute:              5
              policy:              local
              error_code:          429
              error_message:       "Rate limit exceeded - Joke API allows 5 req/min. Retry after 60 seconds."
              hide_client_headers: false

      - name:          joke-frontend-route
        paths:         [/joke-ui]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

  # ---------------------------------------------------------------------------
  # Submit Service (Docker service: submit-service:4200)
  #
  # GET  /submit   → Submit Joke HTML frontend
  # POST /submit   → Joke submission API (publishes to 'submit' queue)
  # GET  /types    → Joke types via ECST cache (no HTTP proxy to joke-service)
  # GET  /docs     → Swagger / OpenAPI documentation UI
  # ---------------------------------------------------------------------------
  - name: submit-service
    url:             http://submit-service:4200
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      - name:          submit-frontend-route
        paths:         [/submit]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      - name:          submit-api-route
        paths:         [/submit]
        strip_path:    false
        preserve_host: false
        methods:       [POST]

      - name:          types-route
        paths:         [/types]
        strip_path:    false
        preserve_host: false
        methods:       [GET]

      - name:          docs-route
        paths:         [/docs]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD]

    plugins:
      - name: rate-limiting
        route: submit-api-route
        config:
          minute:              10
          policy:              local
          error_code:          429
          error_message:       "Rate limit exceeded - Submit API allows 10 req/min. Retry after 60 seconds."
          hide_client_headers: false

  # ---------------------------------------------------------------------------
  # Moderate Service (Docker service: moderate-service:4300)
  #
  # Human moderators review jokes before they enter the database.
  # Authentication handled inside the service via Auth0 OIDC.
  #
  # GET  /moderate-ui  → Moderation UI (HTML frontend)
  # GET  /moderate     → Pull next joke from queue (API, Auth0 protected)
  # POST /moderated    → Approve edited joke (API, Auth0 protected)
  # POST /reject       → Discard joke (API, Auth0 protected)
  # *    /login,/logout,/callback,/me → Auth0 OIDC flow endpoints
  # ---------------------------------------------------------------------------
  - name: moderate-service
    url:             http://moderate-service:4300
    connect_timeout: 5000
    read_timeout:    15000
    write_timeout:   10000
    retries:         2

    routes:
      - name:          moderate-frontend-route
        paths:         [/moderate-ui]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      - name:          moderate-get-route
        paths:         [/moderate]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD]

      - name:          moderated-post-route
        paths:         [/moderated]
        strip_path:    false
        preserve_host: false
        methods:       [POST, OPTIONS]

      - name:          reject-route
        paths:         [/reject]
        strip_path:    false
        preserve_host: false
        methods:       [POST, OPTIONS]

      - name:          moderate-auth-route
        paths:         [/login, /logout, /callback, /me]
        strip_path:    false
        preserve_host: false
        methods:       [GET, POST, OPTIONS]

      - name:          moderate-types-route
        paths:         [/moderate-types]
        strip_path:    false
        preserve_host: false
        methods:       [GET]

  # ---------------------------------------------------------------------------
  # RabbitMQ Management UI (Docker service: rabbitmq:15672)
  # Access: http://localhost:8000/mq-admin/  credentials: guest / guest
  # ---------------------------------------------------------------------------
  - name: rabbitmq-management
    url:             http://rabbitmq:15672
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         1

    routes:
      - name:          mq-admin-route
        paths:         [/mq-admin]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, POST, PUT, DELETE, OPTIONS]

      - name:          mq-api-route
        paths:         [/api]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD, POST, PUT, DELETE, OPTIONS]

  # ---------------------------------------------------------------------------
  # ETL Service (Docker service: etl-service:4001)
  # Health endpoint only — allows operators to verify ETL status via Kong.
  # ---------------------------------------------------------------------------
  - name: etl-service
    url:             http://etl-service:4001
    connect_timeout: 5000
    read_timeout:    5000
    write_timeout:   5000
    retries:         1

    routes:
      - name:          etl-health-route
        paths:         [/etl-health]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD]
