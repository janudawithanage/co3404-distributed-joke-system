<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/moderate-ui/" />
  <title>Moderate · CO3404 Distributed Joke Platform</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1d;
      --surface: rgba(255,255,255,0.04);
      --card: rgba(255,255,255,0.06);
      --stroke: rgba(255,255,255,0.08);
      --accent: #5ce1e6;
      --approve: #7cf6c4;
      --reject: #ff6b6b;
      --text: #e7eefb;
      --muted: #95a4c7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 28px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    body::before {
      content: '';
      position: fixed;
      top: -180px; right: -180px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(92,225,230,0.1) 0%, transparent 70%);
      z-index: 0; pointer-events: none;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      position: relative; z-index: 1;
      width: 100%; max-width: 760px;
      display: flex; justify-content: space-between; gap: 16px; align-items: center;
      flex-wrap: wrap;
    }
    .header-left h1 { font-size: 32px; letter-spacing: -0.01em; }
    .header-left h1 span { color: var(--accent); }
    .header-left p { color: var(--muted); margin-top: 4px; font-size: 14px; }
    .user-info {
      display: flex; gap: 10px; align-items: center;
      background: var(--card); border: 1px solid var(--stroke);
      padding: 10px 14px; border-radius: 14px;
    }
    .user-info img { width: 32px; height: 32px; border-radius: 50%; }
    .user-info span { font-size: 14px; }
    .logout-btn {
      border: 1px solid var(--stroke); background: transparent;
      color: var(--text); padding: 6px 12px; border-radius: 10px;
      cursor: pointer; font-family: inherit; font-size: 13px;
      transition: border-color 0.2s;
    }
    .logout-btn:hover { border-color: var(--reject); color: var(--reject); }

    /* ── Stats Bar ───────────────────────────────────────── */
    .stats-bar {
      position: relative; z-index: 1;
      width: 100%; max-width: 760px;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .stat-pill {
      flex: 1; min-width: 120px;
      background: var(--card); border: 1px solid var(--stroke);
      border-radius: 14px; padding: 12px 16px;
      text-align: center;
    }
    .stat-pill .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-pill .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .stat-pill .value.green { color: var(--approve); }
    .stat-pill .value.red { color: var(--reject); }
    .stat-pill .value.blue { color: var(--accent); }

    /* ── Status Banner ───────────────────────────────────── */
    #status-banner {
      position: relative; z-index: 1;
      max-width: 760px; width: 100%;
      background: var(--card); border: 1px solid var(--stroke);
      border-radius: 16px; padding: 18px 20px;
      display: flex; align-items: center; gap: 12px; color: var(--muted);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Moderation Card ─────────────────────────────────── */
    .mod-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 760px;
      background: var(--card); border: 1px solid var(--stroke);
      border-radius: 20px; padding: 24px;
      display: none; flex-direction: column; gap: 16px;
      animation: slideIn 0.3s ease;
    }
    .mod-card.visible { display: flex; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .mod-card .hint {
      color: var(--muted); font-size: 13px;
      padding: 10px 14px; background: var(--surface);
      border-radius: 10px; border: 1px solid var(--stroke);
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label {
      color: var(--muted); font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
    }
    textarea, input[type="text"], select {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--stroke); color: var(--text);
      padding: 12px 14px; border-radius: 12px;
      font-size: 15px; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea { min-height: 80px; resize: vertical; }
    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: rgba(92,225,230,0.6);
      box-shadow: 0 0 0 3px rgba(92,225,230,0.15);
    }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions button {
      padding: 13px; border: none; border-radius: 13px;
      font-weight: 700; font-size: 15px; font-family: inherit;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .actions button:hover:not(:disabled) { transform: translateY(-2px); }
    .actions button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-approve { background: var(--approve); color: #04101a; box-shadow: 0 8px 30px rgba(124,246,196,0.2); }
    .btn-reject { background: var(--reject); color: #fff; box-shadow: 0 8px 30px rgba(255,107,107,0.2); }

    .shortcut-hint {
      text-align: center; font-size: 12px; color: var(--muted);
      margin-top: -4px;
    }
    kbd {
      background: var(--surface); border: 1px solid var(--stroke);
      padding: 2px 6px; border-radius: 5px; font-size: 11px; font-family: inherit;
    }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--card); border: 1px solid var(--stroke);
      padding: 14px 20px; border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      font-size: 14px; font-weight: 500; z-index: 200;
      transition: transform 0.3s ease;
      max-width: 90vw;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(124,246,196,0.4); }
    #toast.error { border-color: rgba(255,107,107,0.4); }

    @media (max-width: 640px) {
      header { flex-direction: column; align-items: flex-start; }
      .header-left h1 { font-size: 26px; }
      .actions { grid-template-columns: 1fr; }
    }

    /* ── Auth Warning Banner ─────────────────────────────── */
    #auth-warning {
      position: relative; z-index: 1;
      width: 100%; max-width: 760px;
      background: rgba(255, 165, 0, 0.08);
      border: 1px solid rgba(255, 165, 0, 0.4);
      border-radius: 16px; padding: 14px 18px;
      display: none; gap: 10px; align-items: flex-start;
    }
    #auth-warning.visible { display: flex; }
    #auth-warning .warn-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    #auth-warning strong { color: #ffaa00; font-size: 14px; display: block; margin-bottom: 4px; }
    #auth-warning p { font-size: 13px; color: var(--muted); line-height: 1.5; margin: 0; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>⚖️ Joke <span>Moderator</span></h1>
      <p>CO3404 Distributed Systems — Option 4</p>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <img id="user-avatar" src="" alt="avatar" />
      <span id="user-name"></span>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Auth security warning — shown when Auth0 is not configured.
       The banner is hidden by default and made visible by app.js when the
       /me endpoint returns authEnabled:false. -->
  <div id="auth-warning">
    <span class="warn-icon">⚠️</span>
    <div>
      <strong>Authentication Disabled</strong>
      <p id="auth-warning-text"></p>
    </div>
  </div>

  <!-- Session Stats -->
  <div class="stats-bar">
    <div class="stat-pill">
      <div class="label">Approved</div>
      <div class="value green" id="stat-approved">0</div>
    </div>
    <div class="stat-pill">
      <div class="label">Rejected</div>
      <div class="value red" id="stat-rejected">0</div>
    </div>
    <div class="stat-pill">
      <div class="label">Session</div>
      <div class="value blue" id="stat-total">0</div>
    </div>
  </div>

  <!-- Polling status banner -->
  <div id="status-banner">
    <div class="spinner"></div>
    <span id="status-text">Connecting to moderation queue…</span>
  </div>

  <!-- Moderation form card -->
  <div class="mod-card" id="mod-card">
    <div class="hint">📝 Review and optionally edit the joke before approving or rejecting.</div>

    <div class="field-group">
      <label for="setup">Setup (Question)</label>
      <textarea id="setup" rows="2" placeholder="Joke setup…"></textarea>
    </div>

    <div class="field-group">
      <label for="punchline">Punchline (Answer)</label>
      <textarea id="punchline" rows="2" placeholder="Joke punchline…"></textarea>
    </div>

    <div class="field-group">
      <label for="type">Joke Type</label>
      <select id="type">
        <option value="">— select type —</option>
      </select>
    </div>

    <div class="actions">
      <button class="btn-approve" id="btn-approve">
        ✅ Approve
      </button>
      <button class="btn-reject" id="btn-reject">
        ❌ Reject
      </button>
    </div>
    <div class="shortcut-hint">
      <kbd>A</kbd> Approve · <kbd>R</kbd> Reject · <kbd>Ctrl+Enter</kbd> Approve
    </div>
  </div>

  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
