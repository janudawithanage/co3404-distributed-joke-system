# =============================================================================
# infra/kong/kong.local.yml  (LOCAL DEVELOPMENT — Docker Compose)
#
# Kong declarative configuration for local docker-compose.yml.
# Uses Docker service-name DNS resolution (jokes_network bridge) so Kong
# reaches containers by name, not by VM private IP.
#
# Container ports (what the app listens on inside its container):
#   joke-service   → port 4000
#   submit-service → port 4200
#   rabbitmq mgmt  → port 15672
#
# Public routes accessible via http://localhost:8000/<route>:
#   GET  /joke/:type  → joke-service     (rate-limited: 20 req/min local)
#   GET  /joke-ui     → joke frontend
#   GET  /types       → submit-service   (cached proxy to joke-service)
#   GET  /submit      → submit frontend
#   POST /submit      → joke submission API
#   GET  /docs        → Swagger UI
#   *    /mq-admin    → RabbitMQ Management UI
# =============================================================================

_format_version: "3.0"
_transform: true

# =============================================================================
# Global Plugins
# =============================================================================
plugins:
  - name: correlation-id
    config:
      header_name:     Kong-Request-ID
      generator:       uuid
      echo_downstream: true

# =============================================================================
# Services and Routes
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Joke Service — Docker DNS: joke-service:4000
  # (container-internal port 4000; host sees it on localhost:3000)
  # ---------------------------------------------------------------------------
  - name: joke-service
    url:             http://joke-service:4000
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      # GET /joke/:type  — fetch jokes by category
      - name:          joke-route
        paths:         [/joke]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      # GET /joke-ui  — serve Joke Machine HTML frontend
      - name:          joke-frontend-route
        paths:         [/joke-ui]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

    plugins:
      # Rate limiting: 20 req/min locally (higher than prod for easier testing)
      - name: rate-limiting
        config:
          minute:              20
          policy:              local
          error_code:          429
          error_message:       "Rate limit exceeded — 20 req/min allowed. Retry after 60 seconds."
          hide_client_headers: false

  # ---------------------------------------------------------------------------
  # Submit Service — Docker DNS: submit-service:4200
  # (container-internal port 4200; host sees it on localhost:3200)
  # ---------------------------------------------------------------------------
  - name: submit-service
    url:             http://submit-service:4200
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         3

    routes:
      # GET /submit  — serve Submit Joke HTML frontend
      - name:          submit-frontend-route
        paths:         [/submit]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, OPTIONS]

      # POST /submit  — joke submission API (publishes to submitted_jokes queue)
      - name:          submit-api-route
        paths:         [/submit]
        strip_path:    false
        preserve_host: false
        methods:       [POST]

      # GET /types  — list joke categories (proxied from joke-service with cache)
      - name:          types-route
        paths:         [/types]
        strip_path:    false
        preserve_host: false
        methods:       [GET]

      # GET /docs  — Swagger / OpenAPI documentation UI
      - name:          docs-route
        paths:         [/docs]
        strip_path:    false
        preserve_host: false
        methods:       [GET, HEAD]

  # ---------------------------------------------------------------------------
  # RabbitMQ Management UI — Docker DNS: rabbitmq:15672
  # Accessible at http://localhost:8080/mq-admin  (login: guest / guest)
  # strip_path:true removes the /mq-admin prefix before forwarding.
  # ---------------------------------------------------------------------------
  - name: rabbitmq-management
    url:             http://rabbitmq:15672
    connect_timeout: 5000
    read_timeout:    10000
    write_timeout:   10000
    retries:         1

    routes:
      - name:          mq-admin-route
        paths:         [/mq-admin]
        strip_path:    true
        preserve_host: false
        methods:       [GET, HEAD, POST, PUT, DELETE, OPTIONS]
